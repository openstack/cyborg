- job:
    name: cyborg-tempest-base
    abstract: true
    description: |
      base job of all cyborg tempest jobs
    parent: devstack-tempest
    timeout: 7800
    nodeset: devstack-single-node-debian-trixie
    required-projects: &base_required_projects
      - openstack/cyborg
      - openstack/python-cyborgclient
      - openstack/cyborg-tempest-plugin
      - openstack/tempest
    vars: &cyborg_base_vars
      devstack_plugins: &cyborg_devstack_plugins
        cyborg: https://opendev.org/openstack/cyborg
      devstack_services: &cyborg_devstack_services
        tempest: true
        s-account: false
        s-container: false
        s-object: false
        s-proxy: false
        c-api: false
        c-bak: false
        c-sch: false
        c-vol: false
        cinder: false
      devstack_localrc:
        ENABLE_PCI_SIM: true
      tempest_plugins:
        - cyborg-tempest-plugin
      tempest_test_regex: cyborg_tempest_plugin
      tox_envlist: all
    irrelevant-files: &base_irrelevant_files
      - ^.*\.rst$
      - ^doc/.*$
      - ^setup.cfg$
      - ^releasenotes/.*$
      - ^(test-|)requirements.txt$
      - ^.git.*$
      - ^tox.ini$
      - ^cyborg/tests/.*$

- job:
    name: cyborg-grenade
    description: |
      Grenade job that performs upgrade from previous release(N-1) to
      current release(N).
    parent: grenade
    required-projects: *base_required_projects
    vars: &cyborg_grenade_vars
      <<: *cyborg_base_vars
      devstack_localrc:
        ENABLE_PCI_SIM: false
    irrelevant-files: *base_irrelevant_files

- job:
    name: cyborg-grenade-skip-level-always
    description: |
      Grenade job that skips the previous release, validating that projects
      can support upgrades from N-2 to N release. It will always upgrade
      to the current branch. For example: If N-2 is 2025.1 release then N
      would be 2026.1.
    parent: grenade-skip-level-always
    required-projects: *base_required_projects
    vars: *cyborg_grenade_vars
    irrelevant-files: *base_irrelevant_files

- job:
    name: cyborg-multinode-tempest
    abstract: true
    parent: cyborg-tempest-base
    nodeset: devstack-two-node-debian-trixie
    description: |
      Abstract multinode Cyborg devstack tempest job
    group-vars:
      subnode:
        devstack_plugins: *cyborg_devstack_plugins
        devstack_services:
          <<: *cyborg_devstack_services
          cyborg-api: false
          cyborg-cond: false
          tempest: false
        devstack_localrc:
          PCI_SIM_CREATE_TEST_FLAVORS: false
          ENABLE_PCI_SIM: true

- job:
    name: cyborg-tempest-py3
    description: |
      Cyborg devstack tempest tests job for >=Ussuri release
      run on python 3.
    parent: cyborg-multinode-tempest
- job:
    name: cyborg-tempest-ipv6
    parent: devstack-tempest-ipv6
    nodeset: devstack-single-node-debian-trixie
    description: |
      Cyborg devstack tempest tests job for IPv6-only deployment
    voting: true
    timeout: 7800
    required-projects: *base_required_projects
    vars: *cyborg_base_vars
    irrelevant-files: *base_irrelevant_files

- project:
    templates:
      - openstack-cover-jobs
      - check-requirements
      - release-notes-jobs-python3
      - publish-openstack-docs-pti
      - openstack-python3-jobs
    check:
      jobs:
        - cyborg-tempest-py3
        - cyborg-tempest-ipv6
        - cyborg-grenade
        - cyborg-grenade-skip-level-always
    gate:
      jobs:
        - cyborg-tempest-py3
        - cyborg-tempest-ipv6
        - cyborg-grenade
        - cyborg-grenade-skip-level-always
